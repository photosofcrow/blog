<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba</title>
    <style>
        :root {
            --bg: #121214;
            --text: #e1e1e6;
            --accent: #48a9a6;
            --code-bg: #202024;
            --meta: #7c7c8a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 680px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .meta {
            color: var(--meta);
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        h1 { font-size: 2.2rem; line-height: 1.2; margin-top: 0; margin-bottom: 30px; }
        h3 { color: var(--accent); font-size: 1.3rem; margin-top: 40px; margin-bottom: 10px; }
        p  { margin-bottom: 20px; font-size: 1.1rem; }
        code {
            display: block;
            background-color: var(--code-bg);
            padding: 15px;
            border-radius: 4px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.95rem;
            white-space: pre-wrap;
            margin: 25px 0;
            border-left: 3px solid var(--accent);
            color: #f8f8f2;
        }
    </style>
</head>
<body>
    <div class="meta">fotografia · 20& · 0 min de lectura</div>
    <h1>Prueba</h1>
    <main>
        <H1>Hola</H1>
    </main>
</body>
</html>
